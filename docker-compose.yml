services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - rag-data:/app/data
    environment:
      QWEN_API_KEY: ${QWEN_API_KEY}
      MODEL_NAME: ${MODEL_NAME}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  streamlit:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - rag-data:/app/data
    environment:
      QWEN_API_KEY: ${QWEN_API_KEY}
      MODEL_NAME: ${MODEL_NAME}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: streamlit run chat.py --server.address 0.0.0.0 --server.port 8501
    restart: unless-stopped

  cli:
    build: .
    profiles:
      - cli
    stdin_open: true
    tty: true
    volumes:
      - rag-data:/app/data
    environment:
      QWEN_API_KEY: ${QWEN_API_KEY}
      MODEL_NAME: ${MODEL_NAME}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python main.py

volumes:
  rag-data:
